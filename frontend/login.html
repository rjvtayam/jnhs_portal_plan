<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNHS Portal - Login</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #ffffff; color: #1a1a2e; min-height: 100vh; overflow: hidden; }

        .login-container { display: flex; min-height: 100vh; }

        /* LEFT PANEL */
        .login-left {
            flex: 1; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 60px;
            background: url('/assets/images/hero_bg.png') center center / cover no-repeat;
        }
        .login-left::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.25) 100%);
            z-index: 1;
        }
        .login-left-content { position: relative; z-index: 2; text-align: center; }
        .school-badge {
            width: 180px; height: 180px; margin: 0 auto 28px;
            display: flex; align-items: center; justify-content: center;
        }
        .school-badge img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4));
        }
        .login-left h1 {
            font-size: 2.4rem; font-weight: 800; margin-bottom: 8px;
            color: #ffffff !important;
            background: none !important;
            -webkit-background-clip: unset !important;
            -webkit-text-fill-color: #ffffff !important;
            background-clip: unset !important;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6), 0 0 25px rgba(0,0,0,0.3);
        }
        .login-left h1 .portal-text {
            color: #42a5f5 !important;
            -webkit-text-fill-color: #42a5f5 !important;
        }
        .login-left .subtitle { color: rgba(255,255,255,0.95); font-size: 1.05rem; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
        .login-left .school-id { color: rgba(255,255,255,0.85); font-size: 0.85rem; margin-top: 8px; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }

        /* RIGHT PANEL */
        .login-right {
            width: 500px; display: flex; align-items: center; justify-content: center;
            padding: 60px; background: #ffffff; border-left: 1px solid #e2e8f0;
            position: relative; overflow: hidden;
        }
        .login-right .particles-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .login-form { width: 100%; max-width: 360px; position: relative; z-index: 2; }
        .login-form h2 { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; text-align: center; }
        .login-form .subtitle { color: #5a6072; font-size: 0.95rem; margin-bottom: 32px; text-align: center; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #3a3f5a; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
        .input-icon-wrapper { position: relative; }
        .input-icon-wrapper .form-control {
            width: 100%; padding: 12px 14px 12px 40px; border-radius: 10px;
            border: 1px solid #e2e8f0; background: #f8f9fc; color: #1a1a2e;
            font-size: 0.9rem; outline: none; transition: all 0.3s;
        }
        .input-icon-wrapper .form-control:focus {
            border-color: #1e88e5; box-shadow: 0 0 0 3px rgba(30,136,229,0.08);
        }
        .input-icon-wrapper i.input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: #8892b0; font-size: 0.9rem; pointer-events: none;
        }
        .password-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #8892b0; cursor: pointer;
            font-size: 1rem; padding: 4px; transition: color 0.3s; z-index: 2;
        }
        .password-toggle:hover { color: #1e88e5; }
        .input-icon-wrapper .form-control.password-input { padding-right: 42px; }

        .btn-login {
            width: 100%; padding: 13px; font-size: 0.95rem; font-weight: 600;
            border-radius: 10px; border: none; cursor: pointer;
            background: linear-gradient(135deg, #1e88e5, #1565c0); color: white;
            box-shadow: 0 4px 15px rgba(30,136,229,0.3); transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(30,136,229,0.4); }

        .divider {
            display: flex; align-items: center; gap: 16px; margin: 24px 0;
            color: #8892b0; font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: #e2e8f0;
        }

        .login-footer { text-align: center; font-size: 0.75rem; color: #8892b0; }

        @media (max-width: 900px) {
            .login-container { flex-direction: column; }
            .login-left { min-height: 240px; flex: 0 0 240px; }
            .login-left .school-badge { width: 120px; height: 120px; margin-bottom: 16px; }
            .login-left h1 { font-size: 1.6rem; }
            .login-right { width: 100%; border-left: none; flex: 1; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="login-left-content">
                <div class="school-badge"><img src="/assets/images/logo.png" alt="JNHS Logo"></div>
                <h1>JNHS <span class="portal-text">Portal</span></h1>
                <p class="subtitle">Jomalig National High School</p>
                <p class="school-id">Jomalig, Quezon | School ID: 301366</p>
            </div>
        </div>
        <div class="login-right">
            <canvas class="particles-canvas" id="particles"></canvas>
            <div class="login-form">
                <h2>Welcome Back!</h2>
                <p class="subtitle">Sign in to your account</p>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-control" id="username" required placeholder="Enter your username">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-control password-input" id="password" required placeholder="Enter your password">
                            <button type="button" class="password-toggle" onclick="togglePassword()" title="Show/Hide Password">
                                <i class="fas fa-eye-slash" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i>Sign In</button>
                </form>
                <div class="divider">JNHS Portal v1.0</div>
                <p class="login-footer">DepEd K-12 Grading System</p>
            </div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <i class="fas ${icons[type] || icons.info} toast-icon"></i>
                <span class="toast-msg">${message}</span>
                <button class="toast-close" onclick="this.parentElement.classList.add('removing'); setTimeout(() => this.parentElement.remove(), 300);">&times;</button>
            `;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('removing'); setTimeout(() => toast.remove(), 300); }, 5000);
        }
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        if (Auth.isLoggedIn()) {
            const role = Auth.getRole();
            const redirects = {
                super_admin: '/pages/superadmin/dashboard.html',
                admin: '/pages/admin/dashboard.html',
                principal: '/pages/principal/dashboard.html',
                teacher: '/pages/teacher/dashboard.html',
                student: '/pages/student/dashboard.html',
                parent: '/pages/parent/dashboard.html',
                registrar: '/pages/registrar/dashboard.html',
            };
            window.location.href = redirects[role] || '/pages/admin/dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showToast('Please enter both username and password', 'warning');
                return;
            }

            try {
                const result = await api.post('/auth/login', { username, password });
                if (result && result.access_token) {
                    api.setToken(result.access_token);
                    Auth.setUser(result.user);

                    const redirects = {
                        super_admin: '/pages/superadmin/dashboard.html',
                        admin: '/pages/admin/dashboard.html',
                        principal: '/pages/principal/dashboard.html',
                        teacher: '/pages/teacher/dashboard.html',
                        student: '/pages/student/dashboard.html',
                        parent: '/pages/parent/dashboard.html',
                        registrar: '/pages/registrar/dashboard.html',
                    };
                    window.location.href = redirects[result.user.role] || '/pages/admin/dashboard.html';
                }
            } catch (err) {
                showToast(err.message || 'Invalid username or password', 'error');
            }
        });

        // Animated particles
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const PARTICLE_COUNT = 35;
        const colors = ['rgba(233,30,99,0.25)', 'rgba(0,229,255,0.25)', 'rgba(124,77,255,0.25)', 'rgba(233,30,99,0.15)', 'rgba(0,229,255,0.15)'];

        function resizeCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
        }
        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 3 + 2,
                dx: (Math.random() - 0.5) * 0.5,
                dy: (Math.random() - 0.5) * 0.5,
                color: colors[Math.floor(Math.random() * colors.length)],
            };
        }
        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(createParticle());
        }
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                p.x += p.dx;
                p.y += p.dy;
                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
            });
            requestAnimationFrame(drawParticles);
        }
        resizeCanvas(); initParticles(); drawParticles();
        window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
    </script>
</body>
</html>
