<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNHS Portal - Login</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .login-left::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(233, 30, 99, 0.15) 0%, transparent 70%);
            top: 20%;
            left: 30%;
            animation: float 8s ease-in-out infinite;
        }
        .login-left::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.1) 0%, transparent 70%);
            bottom: 20%;
            right: 20%;
            animation: float 10s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }
        .school-badge {
            width: 80px;
            height: 80px;
            background: var(--gradient-1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: white;
            margin-bottom: 24px;
            box-shadow: var(--shadow-glow-pink);
            position: relative;
            z-index: 1;
        }
        .login-left h1 {
            position: relative;
            z-index: 1;
        }
        .login-left > p {
            position: relative;
            z-index: 1;
        }
        .login-form .form-control {
            background: var(--bg-input);
            border-color: var(--border-color);
        }
        .login-form .form-control:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1);
        }
        .login-form .btn-primary {
            width: 100%;
            padding: 13px;
            font-size: 0.95rem;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        .input-icon-wrapper {
            position: relative;
        }
        .input-icon-wrapper .form-control {
            padding-left: 40px;
        }
        .input-icon-wrapper i.input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
        }
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            transition: color 0.3s;
            z-index: 2;
        }
        .password-toggle:hover {
            color: var(--neon-cyan);
        }
        .input-icon-wrapper .form-control.password-input {
            padding-right: 42px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="school-badge">J</div>
            <h1>JNHS Portal</h1>
            <p>Jomalig National High School</p>
            <p style="color: var(--text-muted); margin-top: 8px; font-size: 0.9rem;">Jomalig, Quezon | School ID: 301366</p>
        </div>
        <div class="login-right">
            <div class="login-form">
                <h2>Welcome Back</h2>
                <p class="subtitle">Sign in to your account</p>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-control" id="username" required placeholder="Enter your username">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-control password-input" id="password" required placeholder="Enter your password">
                            <button type="button" class="password-toggle" onclick="togglePassword()" title="Show/Hide Password">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div id="loginError" style="color: var(--danger); margin-bottom: 15px; display: none; font-size: 0.85rem;"></div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>Sign In</button>
                </form>
                <div class="divider">JNHS Portal v1.0</div>
                <p style="text-align:center; font-size:0.75rem; color: var(--text-muted);">DepEd K-12 Grading System</p>
            </div>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        if (Auth.isLoggedIn()) {
            const role = Auth.getRole();
            const redirects = {
                super_admin: '/pages/superadmin/dashboard.html',
                admin: '/pages/admin/dashboard.html',
                principal: '/pages/principal/dashboard.html',
                teacher: '/pages/teacher/dashboard.html',
                student: '/pages/student/dashboard.html',
                parent: '/pages/parent/dashboard.html',
                registrar: '/pages/registrar/dashboard.html',
            };
            window.location.href = redirects[role] || '/pages/admin/dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('loginError');
            errorEl.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const result = await api.post('/auth/login', { username, password });
                if (result && result.access_token) {
                    api.setToken(result.access_token);
                    Auth.setUser(result.user);

                    const redirects = {
                        super_admin: '/pages/superadmin/dashboard.html',
                        admin: '/pages/admin/dashboard.html',
                        principal: '/pages/principal/dashboard.html',
                        teacher: '/pages/teacher/dashboard.html',
                        student: '/pages/student/dashboard.html',
                        parent: '/pages/parent/dashboard.html',
                        registrar: '/pages/registrar/dashboard.html',
                    };
                    window.location.href = redirects[result.user.role] || '/pages/admin/dashboard.html';
                }
            } catch (err) {
                errorEl.textContent = err.message || 'Invalid credentials';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
