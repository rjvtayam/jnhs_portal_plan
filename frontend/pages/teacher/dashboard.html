<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - JNHS Portal</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Teacher Dashboard</h1>
                    <p>Welcome back, <span id="teacherName">Teacher</span></p>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="fas fa-school"></i></div>
                        <div class="stat-info">
                            <h4 id="mySections">0</h4>
                            <p>My Sections</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-user-friends"></i></div>
                        <div class="stat-info">
                            <h4 id="myStudents">0</h4>
                            <p>My Students</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon yellow"><i class="fas fa-book-open"></i></div>
                        <div class="stat-info">
                            <h4 id="mySubjects">0</h4>
                            <p>Assigned Subjects</p>
                        </div>
                    </div>
                </div>

                <div class="grid-2 mb-3">
                    <div class="card">
                        <div class="card-header">
                            <h3>Quick Actions</h3>
                        </div>
                        <div class="card-body">
                            <a href="/pages/teacher/grade-entry.html" class="btn btn-primary mb-2" style="width:100%">Enter Grades</a>
                            <a href="/pages/teacher/attendance.html" class="btn btn-secondary mb-2" style="width:100%">Record Attendance</a>
                            <a href="/pages/teacher/my-sections.html" class="btn btn-outline mb-2" style="width:100%">View Sections</a>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>My Sections</h3>
                        </div>
                        <div class="card-body" id="sectionsList">
                            <p class="text-secondary">Loading...</p>
                        </div>
                    </div>
                </div>

                <div class="grid-2 mb-3">
                    <div class="chart-card">
                        <h3 style="margin-bottom:16px;font-weight:600;">Students per Section</h3>
                        <canvas id="sectionsChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3 style="margin-bottom:16px;font-weight:600;">Subjects Distribution</h3>
                        <canvas id="subjectsChart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Announcements</h3>
                    </div>
                    <div class="card-body" id="announcementsList">
                        <p class="text-secondary">Loading...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('dashboard');

        function getThemeColor(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        let sectionsChart = null;
        let subjectsChart = null;

        function renderSectionsChart(sections) {
            const labels = sections.map(s => `${s.name}`);
            const data = sections.map(s => s.student_count || 0);
            const ctx = document.getElementById('sectionsChart').getContext('2d');

            if (sectionsChart) sectionsChart.destroy();
            sectionsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Students',
                        data: data,
                        backgroundColor: [
                            'rgba(233, 30, 99, 0.7)',
                            'rgba(0, 229, 255, 0.7)',
                            'rgba(124, 77, 255, 0.7)',
                            'rgba(255, 0, 128, 0.7)',
                            'rgba(41, 121, 255, 0.7)',
                            'rgba(0, 230, 118, 0.7)'
                        ],
                        borderColor: [
                            '#e91e63',
                            '#00e5ff',
                            '#7c4dff',
                            '#ff0080',
                            '#2979ff',
                            '#00e676'
                        ],
                        borderWidth: 2,
                        borderRadius: 8,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            ticks: { color: getThemeColor('--text-secondary'), font: { size: 11 } },
                            grid: { color: hexToRgba(getThemeColor('--border-color'), 0.5) }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: { color: getThemeColor('--text-secondary'), stepSize: 5 },
                            grid: { color: hexToRgba(getThemeColor('--border-color'), 0.5) }
                        }
                    }
                }
            });
        }

        function renderSubjectsChart(subjects) {
            if (!subjects || subjects.length === 0) {
                document.getElementById('subjectsChart').parentElement.innerHTML =
                    '<h3 style="margin-bottom:16px;font-weight:600;">Subjects Distribution</h3><p class="text-secondary">No subject data</p>';
                return;
            }
            const labels = subjects.map(s => s.name || s.subject_name || 'Unknown');
            const data = subjects.map(s => s.count || s.student_count || 0);
            const ctx = document.getElementById('subjectsChart').getContext('2d');
            const neonColors = ['#e91e63', '#00e5ff', '#7c4dff', '#ff0080', '#2979ff', '#00e676', '#ffc107', '#ff5252'];

            if (subjectsChart) subjectsChart.destroy();
            subjectsChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: neonColors.slice(0, labels.length).map(c => c + 'cc'),
                        borderColor: neonColors.slice(0, labels.length),
                        borderWidth: 2,
                        hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '60%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: getThemeColor('--text-secondary'),
                                padding: 16,
                                usePointStyle: true,
                                pointStyleWidth: 10,
                                font: { size: 12 }
                            }
                        }
                    }
                }
            });
        }

        async function loadDashboard() {
            try {
                const data = await api.get('/teacher/dashboard');

                document.getElementById('teacherName').textContent = data.teacher.name;
                document.getElementById('mySections').textContent = data.advised_sections;
                document.getElementById('myStudents').textContent = data.total_students;
                document.getElementById('mySubjects').textContent = data.assigned_subjects;

                const sectionsList = document.getElementById('sectionsList');
                if (data.sections && data.sections.length > 0) {
                    sectionsList.innerHTML = data.sections.map(s => `
                        <div style="padding:12px 0;border-bottom:1px solid var(--border-color);">
                            <div style="font-weight:600;color:var(--text-primary);">Grade ${s.grade_level} - ${s.name}</div>
                            <div style="font-size:0.85rem;color:var(--text-secondary);">${s.track || 'General'} | ${s.student_count} students</div>
                            <div style="margin-top:8px;display:flex;gap:6px;">
                                <a href="/pages/teacher/grade-entry.html?section=${s.id}" class="btn btn-primary" style="font-size:0.8rem;padding:4px 10px;">Grades</a>
                                <a href="/pages/teacher/attendance.html?section=${s.id}" class="btn btn-secondary" style="font-size:0.8rem;padding:4px 10px;">Attendance</a>
                            </div>
                        </div>
                    `).join('');

                    renderSectionsChart(data.sections);
                } else {
                    sectionsList.innerHTML = '<p class="text-secondary">No sections assigned</p>';
                }

                if (data.subjects && data.subjects.length > 0) {
                    renderSubjectsChart(data.subjects);
                }

                loadAnnouncements();
            } catch (err) {
                console.error(err);
            }
        }

        async function loadAnnouncements() {
            try {
                const announcements = await api.get('/announcements');
                const container = document.getElementById('announcementsList');

                if (!announcements || announcements.length === 0) {
                    container.innerHTML = '<p class="text-secondary">No announcements</p>';
                    return;
                }

                container.innerHTML = announcements.slice(0, 5).map(a => `
                    <div style="padding:12px 0;border-bottom:1px solid var(--border-color);">
                        <div style="font-weight:600;color:var(--text-primary);">${a.title}</div>
                        <div style="font-size:0.85rem;color:var(--text-secondary);">${formatDateTime(a.created_at)}</div>
                        <p style="margin-top:5px;font-size:0.9rem;color:var(--text-primary);">${a.content.substring(0, 100)}...</p>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        loadDashboard();
    </script>
</body>
</html>
