<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Teachers - JNHS Portal</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Manage Teachers</h1>
                </div>
                <div class="topbar-actions">
                    <button class="btn btn-primary" onclick="showModal('addTeacherModal')">Add Teacher</button>
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="card">
                    <div class="card-header">
                        <h3>All Teachers</h3>
                        <input type="text" class="form-control" placeholder="Search teachers..." id="searchInput" oninput="filterTeachers()" style="width:250px;">
                    </div>
                    <div class="card-body">
                        <table style="width:100%;border-collapse:collapse;">
                            <thead>
                                <tr style="background:#f7fafc;">
                                    <th style="padding:10px;text-align:left;border-bottom:2px solid #e2e8f0;">Name</th>
                                    <th style="padding:10px;text-align:left;border-bottom:2px solid #e2e8f0;">Employee ID</th>
                                    <th style="padding:10px;text-align:left;border-bottom:2px solid #e2e8f0;">Department</th>
                                    <th style="padding:10px;text-align:left;border-bottom:2px solid #e2e8f0;">Specialization</th>
                                    <th style="padding:10px;text-align:left;border-bottom:2px solid #e2e8f0;">Contact</th>
                                    <th style="padding:10px;text-align:center;border-bottom:2px solid #e2e8f0;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="teachersBody">
                                <tr><td colspan="6" style="padding:20px;text-align:center;color:#718096;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="addTeacherModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Teacher</h3>
                <button class="modal-close" onclick="hideModal('addTeacherModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="teacherForm" onsubmit="saveTeacher(event)">
                    <div class="grid-2">
                        <div class="form-group">
                            <label>First Name *</label>
                            <input type="text" class="form-control" id="firstName" required>
                        </div>
                        <div class="form-group">
                            <label>Middle Name</label>
                            <input type="text" class="form-control" id="middleName">
                        </div>
                        <div class="form-group">
                            <label>Last Name *</label>
                            <input type="text" class="form-control" id="lastName" required>
                        </div>
                        <div class="form-group">
                            <label>Employee ID *</label>
                            <input type="text" class="form-control" id="employeeId" required>
                        </div>
                        <div class="form-group">
                            <label>Department</label>
                            <input type="text" class="form-control" id="department">
                        </div>
                        <div class="form-group">
                            <label>Specialization</label>
                            <input type="text" class="form-control" id="specialization">
                        </div>
                        <div class="form-group">
                            <label>Contact Number</label>
                            <input type="text" class="form-control" id="contactNumber">
                        </div>
                    </div>
                    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:15px;">
                        <button type="button" class="btn btn-outline" onclick="hideModal('addTeacherModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Teacher</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('teachers');
        let allTeachers = [];

        async function loadTeachers() {
            try {
                allTeachers = await api.get('/teachers/');
                renderTeachers(allTeachers);
            } catch (err) {
                console.error(err);
            }
        }

        function renderTeachers(teachers) {
            const tbody = document.getElementById('teachersBody');
            if (!teachers || teachers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="padding:20px;text-align:center;color:#718096;">No teachers found</td></tr>';
                return;
            }
            tbody.innerHTML = teachers.map(t => `
                <tr>
                    <td style="padding:10px;border-bottom:1px solid #e2e8f0;font-weight:500;">${t.last_name}, ${t.first_name} ${t.middle_name || ''}</td>
                    <td style="padding:10px;border-bottom:1px solid #e2e8f0;">${t.employee_id || '-'}</td>
                    <td style="padding:10px;border-bottom:1px solid #e2e8f0;">${t.department || '-'}</td>
                    <td style="padding:10px;border-bottom:1px solid #e2e8f0;">${t.specialization || '-'}</td>
                    <td style="padding:10px;border-bottom:1px solid #e2e8f0;">${t.contact_number || '-'}</td>
                    <td style="padding:10px;border-bottom:1px solid #e2e8f0;text-align:center;">
                        <button class="btn btn-sm btn-outline" onclick="deleteTeacher(${t.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTeachers() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allTeachers.filter(t =>
                `${t.first_name} ${t.last_name} ${t.employee_id} ${t.department}`.toLowerCase().includes(q)
            );
            renderTeachers(filtered);
        }

        async function saveTeacher(e) {
            e.preventDefault();
            try {
                await api.post('/teachers/', {
                    first_name: document.getElementById('firstName').value,
                    middle_name: document.getElementById('middleName').value,
                    last_name: document.getElementById('lastName').value,
                    employee_id: document.getElementById('employeeId').value,
                    department: document.getElementById('department').value,
                    specialization: document.getElementById('specialization').value,
                    contact_number: document.getElementById('contactNumber').value,
                });
                showNotification('Teacher added successfully');
                hideModal('addTeacherModal');
                document.getElementById('teacherForm').reset();
                loadTeachers();
            } catch (err) {
                showNotification(err.message || 'Error adding teacher', 'error');
            }
        }

        async function deleteTeacher(id) {
            if (!(await showConfirmModal('Are you sure you want to delete this teacher?', { title: 'Delete Teacher' }))) return;
            try {
                await api.delete(`/teachers/${id}`);
                showNotification('Teacher deleted');
                loadTeachers();
            } catch (err) {
                showNotification(err.message || 'Error deleting teacher', 'error');
            }
        }

        loadTeachers();
    </script>
</body>
</html>
