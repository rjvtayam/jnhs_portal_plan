<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Announcement - JNHS Portal</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Post Announcement</h1>
                    <p>Create and manage announcements for teachers and students</p>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="grid-2">
                    <div class="card">
                        <div class="card-header">
                            <h3>New Announcement</h3>
                        </div>
                        <div class="card-body">
                            <form id="announcementForm">
                                <div class="form-group">
                                    <label>Title *</label>
                                    <input type="text" class="form-control" name="title" required placeholder="Announcement title">
                                </div>
                                <div class="form-group">
                                    <label>Content *</label>
                                    <textarea class="form-control" name="content" rows="6" required placeholder="Write your announcement here..."></textarea>
                                </div>
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label>Target Audience</label>
                                        <select class="form-control" name="target_audience">
                                            <option value="all">All</option>
                                            <option value="teachers">Teachers Only</option>
                                            <option value="students">Students Only</option>
                                            <option value="parents">Parents Only</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Priority</label>
                                        <select class="form-control" name="priority">
                                            <option value="normal">Normal</option>
                                            <option value="high">High</option>
                                            <option value="urgent">Urgent</option>
                                        </select>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary" style="width:100%">Post Announcement</button>
                            </form>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3>Recent Announcements</h3>
                        </div>
                        <div class="card-body" id="announcementsList" style="max-height:500px;overflow-y:auto;">
                            <p class="text-secondary">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('principal-announcements');

        document.getElementById('announcementForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const params = new URLSearchParams(data);
                await api.post(`/principal/announcements?${params.toString()}`);
                showNotification('Announcement posted successfully!');
                e.target.reset();
                loadAnnouncements();
            } catch (err) {
                showNotification(err.message || 'Error posting announcement', 'error');
            }
        });

        async function loadAnnouncements() {
            try {
                const announcements = await api.get('/principal/announcements');
                const container = document.getElementById('announcementsList');
                if (!announcements || announcements.length === 0) {
                    container.innerHTML = '<p class="text-secondary">No announcements yet</p>';
                    return;
                }
                container.innerHTML = announcements.map(a => `
                    <div style="padding:15px 0;border-bottom:1px solid #e2e8f0;">
                        <div style="display:flex;justify-content:space-between;align-items:start;">
                            <strong style="font-size:0.95rem;">${a.title}</strong>
                            <span class="badge badge-${a.priority === 'urgent' ? 'danger' : a.priority === 'high' ? 'warning' : 'info'}">${a.priority}</span>
                        </div>
                        <p style="font-size:0.85rem;color:#4a5568;margin:8px 0;white-space:pre-line;">${a.content}</p>
                        <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:#718096;">
                            <span>Target: ${a.target_audience}</span>
                            <span>${formatDateTime(a.created_at)}</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        loadAnnouncements();
    </script>
</body>
</html>
