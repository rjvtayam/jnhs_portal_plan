<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule - JNHS Portal</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .schedule-table { width: 100%; border-collapse: collapse; }
        .schedule-table th {
            background: #1e3a5f; color: white; padding: 12px; text-align: left;
        }
        .schedule-table td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; }
        .schedule-table tr:hover { background: var(--bg-input); }
        .time-badge {
            display: inline-block; padding: 4px 10px; border-radius: 12px;
            font-size: 0.85rem; background: #ebf8ff; color: #2b6cb0;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>My Schedule</h1>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="card">
                    <div class="card-header">
                        <h3>Weekly Schedule</h3>
                    </div>
                    <div class="card-body" id="scheduleContainer">
                        <p class="text-secondary">Loading schedule...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('schedule');

        async function loadSchedule() {
            try {
                const schedule = await api.get('/student/schedule');
                const container = document.getElementById('scheduleContainer');

                if (!schedule || schedule.length === 0) {
                    container.innerHTML = '<p class="text-secondary">No schedule assigned yet. Please wait for your adviser to set your schedule.</p>';
                    return;
                }

                let html = '<table class="schedule-table">';
                html += '<thead><tr><th>Time</th><th>Subject</th><th>Teacher</th><th>Room</th></tr></thead><tbody>';

                schedule.forEach(s => {
                    html += `<tr>
                        <td><span class="time-badge">${s.schedule || 'TBA'}</span></td>
                        <td><strong>${s.subject}</strong></td>
                        <td>${s.teacher || '-'}</td>
                        <td>${s.room || '-'}</td>
                    </tr>`;
                });

                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }

        loadSchedule();
    </script>
</body>
</html>
