<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - JNHS Portal</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .profile-card {
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a3e 50%, #0d0d1a 100%);
            color: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #7c4dff;
            box-shadow: 0 0 20px rgba(124, 77, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        .profile-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(233, 30, 99, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }
        .profile-card h2 {
            margin-bottom: 5px;
            background: linear-gradient(90deg, #e91e63, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .profile-card p { opacity: 0.8; color: #b0b0d0; }

        .stat-card {
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a3e 100%);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px;
            color: white;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            border-color: #00e5ff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .stat-icon.green { background: rgba(0, 229, 255, 0.15); color: #00e5ff; }
        .stat-icon.red { background: rgba(233, 30, 99, 0.15); color: #e91e63; }
        .stat-icon.yellow { background: rgba(124, 77, 255, 0.15); color: #7c4dff; }

        .stat-info h4 { font-size: 1.8rem; color: #fff; }
        .stat-info p { color: #8888aa; font-size: 0.9rem; }

        .card {
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a3e 100%);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            color: white;
            overflow: hidden;
        }
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
        }
        .card-header h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #00e5ff;
        }
        .card-body { padding: 20px; }

        .grade-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .grade-pass {
            background: rgba(0, 229, 255, 0.15);
            color: #00e5ff;
        }
        .grade-fail {
            background: rgba(233, 30, 99, 0.15);
            color: #e91e63;
        }

        .chart-wrapper {
            background: rgba(13, 13, 26, 0.5);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .schedule-item {
            padding: 10px 0;
            border-bottom: 1px solid #2a2a4a;
        }
        .schedule-item:last-child { border-bottom: none; }
        .schedule-item .subject-name {
            font-weight: 600;
            color: #00e5ff;
        }
        .schedule-item .schedule-details {
            font-size: 0.85rem;
            color: #8888aa;
        }

        .text-secondary { color: #8888aa; }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>My Dashboard</h1>
                    <p>Welcome, <span id="studentName">Student</span></p>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="profile-card">
                    <h2 id="profileName">Loading...</h2>
                    <p>LRN: <span id="profileLRN">-</span></p>
                    <p>Grade <span id="profileGrade">-</span> | Section: <span id="profileSection">-</span></p>
                    <p id="profileTrack" style="display:none;">Track: <span id="profileTrackName">-</span></p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-info">
                            <h4 id="presentCount">0</h4>
                            <p>Days Present</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red"><i class="fas fa-times-circle"></i></div>
                        <div class="stat-info">
                            <h4 id="absentCount">0</h4>
                            <p>Days Absent</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon yellow"><i class="fas fa-clock"></i></div>
                        <div class="stat-info">
                            <h4 id="lateCount">0</h4>
                            <p>Days Tardy</p>
                        </div>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="card">
                        <div class="card-header">
                            <h3>Grades Overview</h3>
                        </div>
                        <div class="card-body">
                            <div class="chart-wrapper">
                                <canvas id="gradesChart"></canvas>
                            </div>
                            <div id="gradesContainer">
                                <p class="text-secondary">Loading grades...</p>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>Attendance & Schedule</h3>
                        </div>
                        <div class="card-body">
                            <div class="chart-wrapper">
                                <canvas id="attendanceChart"></canvas>
                            </div>
                            <div id="scheduleContainer">
                                <p class="text-secondary">Loading schedule...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('dashboard');

        const chartColors = {
            pink: '#e91e63',
            pinkBg: 'rgba(233, 30, 99, 0.2)',
            cyan: '#00e5ff',
            cyanBg: 'rgba(0, 229, 255, 0.2)',
            purple: '#7c4dff',
            purpleBg: 'rgba(124, 77, 255, 0.2)',
            gridColor: 'rgba(255, 255, 255, 0.08)',
            textColor: '#8888aa'
        };

        const chartDefaults = {
            color: chartDefaults?.color || chartColors.textColor,
            font: { family: 'inherit' }
        };

        let gradesChartInstance = null;
        let attendanceChartInstance = null;

        function createGradesChart(labels, data) {
            const ctx = document.getElementById('gradesChart').getContext('2d');
            if (gradesChartInstance) gradesChartInstance.destroy();
            gradesChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Grade',
                        data: data,
                        backgroundColor: chartColors.cyanBg,
                        borderColor: chartColors.cyan,
                        borderWidth: 2,
                        pointBackgroundColor: chartColors.cyan,
                        pointBorderColor: '#fff',
                        pointBorderWidth: 1,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                stepSize: 20,
                                color: chartColors.textColor,
                                backdropColor: 'transparent',
                                font: { size: 10 }
                            },
                            grid: { color: chartColors.gridColor },
                            angleLines: { color: chartColors.gridColor },
                            pointLabels: {
                                color: '#d0d0e0',
                                font: { size: 11 }
                            }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function createAttendanceChart(present, absent, late) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            if (attendanceChartInstance) attendanceChartInstance.destroy();
            attendanceChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Present', 'Absent', 'Late'],
                    datasets: [{
                        label: 'Days',
                        data: [present, absent, late],
                        backgroundColor: [
                            chartColors.cyanBg,
                            chartColors.pinkBg,
                            chartColors.purpleBg
                        ],
                        borderColor: [
                            chartColors.cyan,
                            chartColors.pink,
                            chartColors.purple
                        ],
                        borderWidth: 2,
                        borderRadius: 6,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        x: {
                            ticks: { color: chartColors.textColor },
                            grid: { display: false }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: chartColors.textColor,
                                stepSize: 1
                            },
                            grid: { color: chartColors.gridColor }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        async function loadDashboard() {
            try {
                const data = await api.get('/student/dashboard');

                document.getElementById('studentName').textContent = `${data.student.last_name}, ${data.student.first_name}`;
                document.getElementById('profileName').textContent = `${data.student.last_name}, ${data.student.first_name} ${data.student.middle_name || ''}`;
                document.getElementById('profileLRN').textContent = data.student.lrn;

                if (data.section) {
                    document.getElementById('profileGrade').textContent = data.section.grade_level;
                    document.getElementById('profileSection').textContent = data.section.name;
                    if (data.section.track) {
                        document.getElementById('profileTrack').style.display = 'block';
                        document.getElementById('profileTrackName').textContent = data.section.track;
                    }
                }

                document.getElementById('presentCount').textContent = data.attendance.present;
                document.getElementById('absentCount').textContent = data.attendance.absent;
                document.getElementById('lateCount').textContent = data.attendance.late;

                createAttendanceChart(data.attendance.present, data.attendance.absent, data.attendance.late);

                loadGrades();
                loadSchedule();
            } catch (err) {
                console.error(err);
            }
        }

        async function loadGrades() {
            try {
                const grades = await api.get('/student/grades');
                const container = document.getElementById('gradesContainer');

                if (!grades || grades.length === 0) {
                    container.innerHTML = '<p class="text-secondary">No grades recorded yet</p>';
                    return;
                }

                const grouped = {};
                grades.forEach(g => {
                    if (!grouped[g.subject]) grouped[g.subject] = {};
                    grouped[g.subject][g.quarter] = g.transmuted_grade;
                });

                const subjects = Object.keys(grouped).sort();
                const latestGrades = subjects.map(s => {
                    const q = grouped[s];
                    return q.Q4 || q.Q3 || q.Q2 || q.Q1 || 0;
                });

                createGradesChart(subjects, latestGrades);

                let html = '<table style="width:100%;border-collapse:collapse;margin-top:15px;">';
                html += '<tr><th style="padding:8px;text-align:left;border-bottom:1px solid #2a2a4a;color:#00e5ff;">Subject</th><th style="padding:8px;border-bottom:1px solid #2a2a4a;color:#00e5ff;">Q1</th><th style="padding:8px;border-bottom:1px solid #2a2a4a;color:#00e5ff;">Q2</th><th style="padding:8px;border-bottom:1px solid #2a2a4a;color:#00e5ff;">Q3</th><th style="padding:8px;border-bottom:1px solid #2a2a4a;color:#00e5ff;">Q4</th></tr>';

                subjects.forEach(subject => {
                    const q = grouped[subject];
                    html += `<tr><td style="padding:8px;border-bottom:1px solid #2a2a4a;color:#d0d0e0;">${subject}</td>`;
                    ['Q1', 'Q2', 'Q3', 'Q4'].forEach(qtr => {
                        const grade = q[qtr];
                        if (grade !== undefined && grade !== null) {
                            const cls = grade >= 75 ? 'grade-pass' : 'grade-fail';
                            html += `<td style="padding:8px;text-align:center;border-bottom:1px solid #2a2a4a;"><span class="grade-badge ${cls}">${grade}</span></td>`;
                        } else {
                            html += '<td style="padding:8px;text-align:center;border-bottom:1px solid #2a2a4a;color:#555577;">-</td>';
                        }
                    });
                    html += '</tr>';
                });
                html += '</table>';
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }

        async function loadSchedule() {
            try {
                const schedule = await api.get('/student/schedule');
                const container = document.getElementById('scheduleContainer');

                if (!schedule || schedule.length === 0) {
                    container.innerHTML = '<p class="text-secondary">No schedule assigned</p>';
                    return;
                }

                container.innerHTML = '<div style="margin-top:15px;">' + schedule.map(s => `
                    <div class="schedule-item">
                        <div class="subject-name">${s.subject}</div>
                        <div class="schedule-details">
                            ${s.teacher} | ${s.schedule || 'TBA'} | ${s.room || 'TBA'}
                        </div>
                    </div>
                `).join('') + '</div>';
            } catch (err) {
                console.error(err);
            }
        }

        loadDashboard();
    </script>
</body>
</html>
