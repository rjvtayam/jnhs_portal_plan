<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Dashboard - JNHS Portal</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Registrar Dashboard</h1>
                    <p>Enrollment & Records Overview</p>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">&#9632;</div>
                        <div class="stat-info">
                            <h4 id="totalStudents">0</h4>
                            <p>Total Students</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">&#9632;</div>
                        <div class="stat-info">
                            <h4 id="enrolledThisSy">0</h4>
                            <p>Enrolled (SY 2025-2026)</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon yellow">&#9632;</div>
                        <div class="stat-info">
                            <h4 id="totalSections">0</h4>
                            <p>Total Sections</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red">&#9632;</div>
                        <div class="stat-info">
                            <h4 id="studentsWithAccounts">0</h4>
                            <p>Students with Accounts</p>
                        </div>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="card">
                        <div class="card-header">
                            <h3>Enrollment by Grade Level</h3>
                        </div>
                        <div class="card-body" id="enrollmentByGrade">
                            <p class="text-secondary">Loading...</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>Quick Actions</h3>
                        </div>
                        <div class="card-body">
                            <a href="/pages/registrar/enrollment.html" class="btn btn-primary mb-2" style="width:100%">Enroll Student</a>
                            <a href="/pages/registrar/account-creation.html" class="btn btn-secondary mb-2" style="width:100%">Create Account</a>
                            <a href="/pages/registrar/reports.html" class="btn btn-outline mb-2" style="width:100%">Generate Reports</a>
                            <a href="/pages/registrar/students.html" class="btn btn-outline mb-2" style="width:100%">Student Records</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('registrar-dashboard');

        async function loadDashboard() {
            try {
                const data = await api.get('/registrar/dashboard');
                document.getElementById('totalStudents').textContent = data.total_students;
                document.getElementById('enrolledThisSy').textContent = data.enrolled_this_sy;
                document.getElementById('totalSections').textContent = data.total_sections;
                document.getElementById('studentsWithAccounts').textContent = data.students_with_accounts;

                const container = document.getElementById('enrollmentByGrade');
                const grades = data.by_grade || {};
                const entries = Object.entries(grades);
                if (entries.length === 0) {
                    container.innerHTML = '<p class="text-secondary">No enrollment data</p>';
                    return;
                }
                container.innerHTML = entries.map(([grade, count]) => `
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                        <div style="width:100px;font-weight:500;">${grade}</div>
                        <div style="flex:1;background:#e2e8f0;border-radius:4px;height:24px;overflow:hidden;">
                            <div style="height:100%;width:${count}0%;background:#3182ce;border-radius:4px;"></div>
                        </div>
                        <div style="width:40px;text-align:right;font-weight:600;">${count}</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        loadDashboard();
    </script>
</body>
</html>
