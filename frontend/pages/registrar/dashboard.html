<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Dashboard - JNHS Portal</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Registrar Dashboard</h1>
                    <p>Enrollment & Records Overview</p>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="fas fa-user-graduate"></i></div>
                        <div class="stat-info">
                            <h4 id="totalStudents">0</h4>
                            <p>Total Students</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-clipboard-check"></i></div>
                        <div class="stat-info">
                            <h4 id="enrolledThisSy">0</h4>
                            <p>Enrolled (SY 2025-2026)</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon yellow"><i class="fas fa-layer-group"></i></div>
                        <div class="stat-info">
                            <h4 id="totalSections">0</h4>
                            <p>Total Sections</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red"><i class="fas fa-user-check"></i></div>
                        <div class="stat-info">
                            <h4 id="studentsWithAccounts">0</h4>
                            <p>Students with Accounts</p>
                        </div>
                    </div>
                </div>

                <div class="grid-2 mb-3">
                    <div class="card">
                        <div class="card-header">
                            <h3>Enrollment by Grade Level</h3>
                        </div>
                        <div class="card-body">
                            <canvas id="enrollmentChart" height="260"></canvas>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>Account Creation Status</h3>
                        </div>
                        <div class="card-body">
                            <canvas id="accountsChart" height="260"></canvas>
                        </div>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="card">
                        <div class="card-header">
                            <h3>Enrollment by Grade Level</h3>
                        </div>
                        <div class="card-body" id="enrollmentByGrade">
                            <p class="text-secondary">Loading...</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>Quick Actions</h3>
                        </div>
                        <div class="card-body">
                            <a href="/pages/registrar/enrollment.html" class="btn btn-primary mb-2" style="width:100%">Enroll Student</a>
                            <a href="/pages/registrar/account-creation.html" class="btn btn-secondary mb-2" style="width:100%">Create Account</a>
                            <a href="/pages/registrar/reports.html" class="btn btn-outline mb-2" style="width:100%">Generate Reports</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('registrar-dashboard');

        function getThemeColor(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        let enrollmentChartInstance = null;
        let accountsChartInstance = null;

        const neonColors = [
            'rgba(233, 30, 99, 0.8)',
            'rgba(0, 229, 255, 0.8)',
            'rgba(124, 77, 255, 0.8)',
            'rgba(255, 0, 128, 0.8)',
            'rgba(41, 121, 255, 0.8)',
            'rgba(0, 230, 118, 0.8)',
            'rgba(255, 193, 7, 0.8)',
            'rgba(255, 82, 82, 0.8)'
        ];

        const neonBorders = [
            'rgba(233, 30, 99, 1)',
            'rgba(0, 229, 255, 1)',
            'rgba(124, 77, 255, 1)',
            'rgba(255, 0, 128, 1)',
            'rgba(41, 121, 255, 1)',
            'rgba(0, 230, 118, 1)',
            'rgba(255, 193, 7, 1)',
            'rgba(255, 82, 82, 1)'
        ];

        function createEnrollmentChart(labels, data) {
            const ctx = document.getElementById('enrollmentChart').getContext('2d');
            if (enrollmentChartInstance) enrollmentChartInstance.destroy();
            enrollmentChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Students Enrolled',
                        data: data,
                        backgroundColor: neonColors.slice(0, labels.length),
                        borderColor: neonBorders.slice(0, labels.length),
                        borderWidth: 2,
                        borderRadius: 6,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: hexToRgba(getThemeColor('--bg-card'), 0.95),
                            titleColor: getThemeColor('--text-primary'),
                            bodyColor: getThemeColor('--neon-cyan'),
                            borderColor: hexToRgba(getThemeColor('--neon-cyan'), 0.3),
                            borderWidth: 1,
                            cornerRadius: 8,
                            padding: 12
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: hexToRgba(getThemeColor('--border-color'), 0.6), drawBorder: false },
                            ticks: { color: getThemeColor('--text-secondary'), font: { size: 12 } }
                        },
                        y: {
                            grid: { color: hexToRgba(getThemeColor('--border-color'), 0.6), drawBorder: false },
                            ticks: { color: getThemeColor('--text-secondary'), font: { size: 12 }, stepSize: 1 },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function createAccountsChart(withAccounts, withoutAccounts) {
            const ctx = document.getElementById('accountsChart').getContext('2d');
            if (accountsChartInstance) accountsChartInstance.destroy();
            accountsChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['With Accounts', 'Without Accounts'],
                    datasets: [{
                        data: [withAccounts, withoutAccounts],
                        backgroundColor: ['rgba(0, 230, 118, 0.8)', 'rgba(255, 82, 82, 0.8)'],
                        borderColor: ['rgba(0, 230, 118, 1)', 'rgba(255, 82, 82, 1)'],
                        borderWidth: 2,
                        hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '60%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: getThemeColor('--text-primary'),
                                padding: 20,
                                font: { size: 13 },
                                usePointStyle: true,
                                pointStyleWidth: 12
                            }
                        },
                        tooltip: {
                            backgroundColor: hexToRgba(getThemeColor('--bg-card'), 0.95),
                            titleColor: getThemeColor('--text-primary'),
                            bodyColor: getThemeColor('--neon-cyan'),
                            borderColor: hexToRgba(getThemeColor('--neon-cyan'), 0.3),
                            borderWidth: 1,
                            cornerRadius: 8,
                            padding: 12,
                            callbacks: {
                                label: function(ctx) {
                                    const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                    const pct = total > 0 ? ((ctx.parsed / total) * 100).toFixed(1) : 0;
                                    return `${ctx.label}: ${ctx.parsed} (${pct}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        async function loadDashboard() {
            try {
                const data = await api.get('/registrar/dashboard');
                document.getElementById('totalStudents').textContent = data.total_students;
                document.getElementById('enrolledThisSy').textContent = data.enrolled_this_sy;
                document.getElementById('totalSections').textContent = data.total_sections;
                document.getElementById('studentsWithAccounts').textContent = data.students_with_accounts;

                const grades = data.by_grade || {};
                const gradeEntries = Object.entries(grades);
                if (gradeEntries.length > 0) {
                    const labels = gradeEntries.map(e => e[0]);
                    const values = gradeEntries.map(e => e[1]);
                    createEnrollmentChart(labels, values);
                }

                const withAcc = data.students_with_accounts || 0;
                const totalStu = data.total_students || 0;
                const withoutAcc = totalStu - withAcc;
                createAccountsChart(withAcc, withoutAcc > 0 ? withoutAcc : 0);

                const container = document.getElementById('enrollmentByGrade');
                if (gradeEntries.length === 0) {
                    container.innerHTML = '<p class="text-secondary">No enrollment data</p>';
                } else {
                    const maxCount = Math.max(...gradeEntries.map(e => e[1]));
                    container.innerHTML = gradeEntries.map(([grade, count]) => {
                        const pct = maxCount > 0 ? (count / maxCount) * 100 : 0;
                        return `
                        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                            <div style="width:100px;font-weight:500;color:var(--text-primary)">${grade}</div>
                            <div style="flex:1;background:var(--bg-input);border-radius:4px;height:24px;overflow:hidden;border:1px solid var(--border-color)">
                                <div style="height:100%;width:${pct}%;background:var(--gradient-2);border-radius:4px;"></div>
                            </div>
                            <div style="width:40px;text-align:right;font-weight:600;color:var(--neon-cyan)">${count}</div>
                        </div>
                    `}).join('');
                }
            } catch (err) {
                console.error(err);
            }
        }

        loadDashboard();
    </script>
</body>
</html>
