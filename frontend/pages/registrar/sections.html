<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sections - JNHS Portal</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Sections Management</h1>
                    <p>View sections and enrolled students</p>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="grid-3">
                            <div class="form-group">
                                <label>Grade Level</label>
                                <select class="form-control" id="gradeFilter" onchange="loadSections()">
                                    <option value="">All Grades</option>
                                    <option value="7">Grade 7</option>
                                    <option value="8">Grade 8</option>
                                    <option value="9">Grade 9</option>
                                    <option value="10">Grade 10</option>
                                    <option value="11">Grade 11</option>
                                    <option value="12">Grade 12</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>School Year</label>
                                <select class="form-control" id="schoolYear" onchange="loadSections()">
                                    <option value="2025-2026">2025-2026</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>&nbsp;</label>
                                <button class="btn btn-outline" style="width:100%" onclick="loadSections()">Refresh</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>All Sections</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Section Name</th>
                                        <th>Grade Level</th>
                                        <th>Track</th>
                                        <th>Adviser</th>
                                        <th>Enrolled</th>
                                        <th>Capacity</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="sectionsTable">
                                    <tr><td colspan="7" class="text-center text-secondary">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="card mt-3" id="sectionStudentsCard" style="display:none;">
                    <div class="card-header">
                        <h3 id="sectionStudentsTitle">Students in Section</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>LRN</th>
                                        <th>Name</th>
                                        <th>Gender</th>
                                    </tr>
                                </thead>
                                <tbody id="sectionStudentsTable">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('registrar-sections');

        async function loadSections() {
            try {
                const sy = document.getElementById('schoolYear').value;
                let url = '/registrar/sections?';
                if (sy) url += `school_year=${sy}`;

                const sections = await api.get(url);
                const tbody = document.getElementById('sectionsTable');
                if (!sections || sections.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-secondary">No sections found</td></tr>';
                    return;
                }
                tbody.innerHTML = sections.map(s => `
                    <tr>
                        <td><strong>${s.name}</strong></td>
                        <td>Grade ${s.grade_level}</td>
                        <td>${s.track || 'N/A'}</td>
                        <td>${s.adviser}</td>
                        <td><span class="badge badge-${s.enrolled_count >= s.max_students ? 'danger' : 'success'}">${s.enrolled_count}</span></td>
                        <td>${s.max_students}</td>
                        <td><button class="btn btn-sm btn-outline" onclick="viewSectionStudents(${s.id}, '${s.name}')">View Students</button></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function viewSectionStudents(sectionId, sectionName) {
            try {
                const students = await api.get(`/registrar/sections/${sectionId}/students`);
                document.getElementById('sectionStudentsCard').style.display = 'block';
                document.getElementById('sectionStudentsTitle').textContent = `Students in ${sectionName}`;

                const tbody = document.getElementById('sectionStudentsTable');
                if (!students || students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center text-secondary">No students in this section</td></tr>';
                    return;
                }
                tbody.innerHTML = students.map(s => `
                    <tr>
                        <td>${s.lrn}</td>
                        <td>${s.last_name}, ${s.first_name}</td>
                        <td>${s.gender || '-'}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        loadSections();
    </script>
</body>
</html>
