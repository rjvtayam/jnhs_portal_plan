<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Accounts - JNHS Portal</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Create Accounts</h1>
                    <p>Create login accounts for students and parents</p>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="grid-2">
                    <div class="card">
                        <div class="card-header">
                            <h3>Create Student Account</h3>
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label>Search Student by LRN</label>
                                <input type="text" class="form-control" id="studentLRN" placeholder="Enter LRN..." oninput="searchStudentForAccount()">
                                <div id="studentAccountResults" style="max-height:150px;overflow-y:auto;border:1px solid var(--border-color);border-radius:4px;margin-top:5px;display:none;background:var(--bg-card);"></div>
                            </div>
                            <div id="selectedStudentAccount" style="display:none;background:var(--bg-card);padding:10px;border-radius:4px;margin-bottom:15px;border:1px solid var(--border-color);"></div>
                            <input type="hidden" id="selectedStudentIdForAccount">
                            <button class="btn btn-primary" style="width:100%" onclick="createStudentAccount()">Create Student Account</button>
                            <p style="margin-top:10px;font-size:0.8rem;color:var(--text-muted);">
                                Username = LRN | Password = LRN
                            </p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3>Create Parent Account</h3>
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label>Search Student by LRN</label>
                                <input type="text" class="form-control" id="parentStudentLRN" placeholder="Enter student LRN..." oninput="searchStudentForParent()">
                                <div id="parentStudentResults" style="max-height:150px;overflow-y:auto;border:1px solid var(--border-color);border-radius:4px;margin-top:5px;display:none;background:var(--bg-card);"></div>
                            </div>
                            <div id="selectedParentStudent" style="display:none;background:var(--bg-card);padding:10px;border-radius:4px;margin-bottom:15px;border:1px solid var(--border-color);"></div>
                            <input type="hidden" id="selectedStudentIdForParent">
                            <div class="form-group">
                                <label>Parent Email</label>
                                <input type="email" class="form-control" id="parentEmail" placeholder="parent@email.com">
                            </div>
                            <button class="btn btn-primary" style="width:100%" onclick="createParentAccount()">Create Parent Account</button>
                            <p style="margin-top:10px;font-size:0.8rem;color:var(--text-muted);">
                                Username = Email | Password = Child's LRN
                            </p>
                        </div>
                    </div>
                </div>

                <div class="card mt-3">
                    <div class="card-header">
                        <h3>Created Accounts</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>LRN</th>
                                        <th>Name</th>
                                        <th>Role</th>
                                        <th>Status</th>
                                        <th>Username</th>
                                    </tr>
                                </thead>
                                <tbody id="accountsTable">
                                    <tr><td colspan="5" class="text-center text-secondary">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('registrar-accounts');

        async function searchStudentForAccount() {
            const query = document.getElementById('studentLRN').value;
            if (query.length < 2) {
                document.getElementById('studentAccountResults').style.display = 'none';
                return;
            }
            try {
                const students = await api.get(`/registrar/students?search=${encodeURIComponent(query)}`);
                const container = document.getElementById('studentAccountResults');
                container.style.display = 'block';
                container.innerHTML = students.slice(0, 10).map(s => `
                    <div style="padding:8px;cursor:pointer;border-bottom:1px solid var(--border-color);color:var(--text-primary);" onclick="selectStudentForAccount(${s.id}, '${s.lrn}', '${s.last_name}, ${s.first_name}', ${s.has_account})">
                        <strong>${s.lrn}</strong> - ${s.last_name}, ${s.first_name}
                        ${s.has_account ? '<span style="color:#00e676;margin-left:8px;font-size:0.8rem;">Has Account</span>' : '<span style="color:#ffc107;margin-left:8px;font-size:0.8rem;">No Account</span>'}
                    </div>
                `).join('') || '<div style="padding:8px;color:var(--text-muted);">No students found</div>';
            } catch (err) {
                console.error(err);
            }
        }

        function selectStudentForAccount(id, lrn, name, hasAccount) {
            document.getElementById('selectedStudentIdForAccount').value = id;
            document.getElementById('studentLRN').value = lrn;
            document.getElementById('studentAccountResults').style.display = 'none';
            document.getElementById('selectedStudentAccount').style.display = 'block';
            document.getElementById('selectedStudentAccount').innerHTML = `
                <strong>${name}</strong> (LRN: ${lrn})
                ${hasAccount ? '<br><span style="color:#00e676;">Account already exists</span>' : '<br><span style="color:#ffc107;">No account yet</span>'}
            `;
        }

        async function createStudentAccount() {
            const studentId = document.getElementById('selectedStudentIdForAccount').value;
            if (!studentId) {
                showNotification('Please select a student', 'error');
                return;
            }
            try {
                const result = await api.post(`/registrar/accounts/create-student?student_id=${studentId}`);
                showNotification(`Account created! Username: ${result.username}, Password: ${result.password}`);
                document.getElementById('selectedStudentAccount').style.display = 'none';
                document.getElementById('studentLRN').value = '';
                loadAccounts();
            } catch (err) {
                showNotification(err.message || 'Error creating account', 'error');
            }
        }

        async function searchStudentForParent() {
            const query = document.getElementById('parentStudentLRN').value;
            if (query.length < 2) {
                document.getElementById('parentStudentResults').style.display = 'none';
                return;
            }
            try {
                const students = await api.get(`/registrar/students?search=${encodeURIComponent(query)}`);
                const container = document.getElementById('parentStudentResults');
                container.style.display = 'block';
                container.innerHTML = students.slice(0, 10).map(s => `
                    <div style="padding:8px;cursor:pointer;border-bottom:1px solid var(--border-color);color:var(--text-primary);" onclick="selectStudentForParent(${s.id}, '${s.lrn}', '${s.last_name}, ${s.first_name}', '${s.guardian_name || ''}')">
                        <strong>${s.lrn}</strong> - ${s.last_name}, ${s.first_name}
                    </div>
                `).join('') || '<div style="padding:8px;color:var(--text-muted);">No students found</div>';
            } catch (err) {
                console.error(err);
            }
        }

        function selectStudentForParent(id, lrn, name, guardian) {
            document.getElementById('selectedStudentIdForParent').value = id;
            document.getElementById('parentStudentLRN').value = lrn;
            document.getElementById('parentStudentResults').style.display = 'none';
            document.getElementById('selectedParentStudent').style.display = 'block';
            document.getElementById('selectedParentStudent').innerHTML = `
                <strong>${name}</strong> (LRN: ${lrn})<br>
                <span style="color:var(--text-muted);">Guardian: ${guardian || 'Not set'}</span>
            `;
        }

        async function createParentAccount() {
            const studentId = document.getElementById('selectedStudentIdForParent').value;
            const email = document.getElementById('parentEmail').value;
            if (!studentId || !email) {
                showNotification('Please select a student and enter parent email', 'error');
                return;
            }
            try {
                const result = await api.post(`/registrar/accounts/create-parent?student_id=${studentId}&parent_email=${email}`);
                showNotification(`Parent account created! Username: ${result.username}, Password: ${result.password}`);
                document.getElementById('selectedParentStudent').style.display = 'none';
                document.getElementById('parentStudentLRN').value = '';
                document.getElementById('parentEmail').value = '';
                loadAccounts();
            } catch (err) {
                showNotification(err.message || 'Error creating parent account', 'error');
            }
        }

        async function loadAccounts() {
            try {
                const students = await api.get('/students/');
                const tbody = document.getElementById('accountsTable');

                if (!students || students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="padding:20px;text-align:center;color:var(--text-muted);">No students found</td></tr>';
                    return;
                }

                tbody.innerHTML = students.map(s => `
                    <tr>
                        <td style="padding:8px;border-bottom:1px solid var(--border-color);color:var(--text-primary);">${s.lrn}</td>
                        <td style="padding:8px;border-bottom:1px solid var(--border-color);color:var(--text-primary);">${s.last_name}, ${s.first_name}</td>
                        <td style="padding:8px;border-bottom:1px solid var(--border-color);"><span style="color:#2979ff;">Student</span></td>
                        <td style="padding:8px;border-bottom:1px solid var(--border-color);">${s.has_account ? '<span style="color:#00e676;">Active</span>' : '<span style="color:#ffc107;">No Account</span>'}</td>
                        <td style="padding:8px;border-bottom:1px solid var(--border-color);color:var(--text-primary);">${s.username || '-'}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        loadAccounts();
    </script>
</body>
</html>
