<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records - JNHS Portal</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Student Records</h1>
                    <p>Manage all student information</p>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                    <button class="btn btn-primary" onclick="showModal('addStudentModal')">+ Add Student</button>
                </div>
            </div>
            <div class="content">
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="grid-3">
                            <div class="form-group">
                                <label>Search</label>
                                <input type="text" class="form-control" id="searchInput" placeholder="LRN or name..." oninput="debounceSearch()">
                            </div>
                            <div class="form-group">
                                <label>Grade Level</label>
                                <select class="form-control" id="gradeFilter" onchange="loadStudents()">
                                    <option value="">All Grades</option>
                                    <option value="7">Grade 7</option>
                                    <option value="8">Grade 8</option>
                                    <option value="9">Grade 9</option>
                                    <option value="10">Grade 10</option>
                                    <option value="11">Grade 11</option>
                                    <option value="12">Grade 12</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>&nbsp;</label>
                                <button class="btn btn-outline" style="width:100%" onclick="loadStudents()">Refresh</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Students</h3>
                        <span id="studentCount" class="text-secondary"></span>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>LRN</th>
                                        <th>Name</th>
                                        <th>Gender</th>
                                        <th>Grade</th>
                                        <th>Section</th>
                                        <th>Contact</th>
                                        <th>Account</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="studentsTable">
                                    <tr><td colspan="8" class="text-center text-secondary">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="addStudentModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Add New Student</h3>
                <button onclick="hideModal('addStudentModal')" style="background:none;border:none;font-size:1.5rem;cursor:pointer">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addStudentForm">
                    <div class="grid-2">
                        <div class="form-group">
                            <label>LRN *</label>
                            <input type="text" class="form-control" name="lrn" required placeholder="12-digit LRN">
                        </div>
                        <div class="form-group">
                            <label>First Name *</label>
                            <input type="text" class="form-control" name="first_name" required>
                        </div>
                        <div class="form-group">
                            <label>Middle Name</label>
                            <input type="text" class="form-control" name="middle_name">
                        </div>
                        <div class="form-group">
                            <label>Last Name *</label>
                            <input type="text" class="form-control" name="last_name" required>
                        </div>
                        <div class="form-group">
                            <label>Extension</label>
                            <input type="text" class="form-control" name="extension_name" placeholder="Jr., Sr.">
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select class="form-control" name="gender">
                                <option value="">Select...</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Birth Date</label>
                            <input type="date" class="form-control" name="birth_date">
                        </div>
                        <div class="form-group">
                            <label>Contact Number</label>
                            <input type="text" class="form-control" name="contact_number">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea class="form-control" name="address" rows="2"></textarea>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Guardian Name</label>
                            <input type="text" class="form-control" name="guardian_name">
                        </div>
                        <div class="form-group">
                            <label>Guardian Contact</label>
                            <input type="text" class="form-control" name="guardian_contact">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="hideModal('addStudentModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveStudent()">Save Student</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('registrar-students');

        let searchTimeout;
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadStudents(), 300);
        }

        async function loadStudents() {
            try {
                const search = document.getElementById('searchInput').value;
                const grade = document.getElementById('gradeFilter').value;
                let url = '/registrar/students?';
                if (search) url += `search=${encodeURIComponent(search)}&`;
                if (grade) url += `grade_level=${grade}`;

                const students = await api.get(url);
                document.getElementById('studentCount').textContent = `${students.length} students`;

                const tbody = document.getElementById('studentsTable');
                if (!students || students.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-secondary">No students found</td></tr>';
                    return;
                }
                tbody.innerHTML = students.map(s => `
                    <tr>
                        <td>${s.lrn}</td>
                        <td><strong>${s.last_name}, ${s.first_name} ${s.middle_name || ''}</strong></td>
                        <td>${s.gender || '-'}</td>
                        <td>Grade ${s.grade_level}</td>
                        <td>${s.section}</td>
                        <td>${s.contact_number || '-'}</td>
                        <td>${s.has_account ? '<span class="badge badge-success">Created</span>' : '<span class="badge badge-warning">None</span>'}</td>
                        <td><button class="btn btn-sm btn-outline" onclick="viewStudent(${s.id})">View</button></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function saveStudent() {
            const form = document.getElementById('addStudentForm');
            const formData = new FormData(form);
            const params = new URLSearchParams();
            for (const [key, value] of formData.entries()) {
                if (value) params.append(key, value);
            }

            try {
                await api.post(`/registrar/students?${params.toString()}`);
                hideModal('addStudentModal');
                showNotification('Student added successfully');
                form.reset();
                loadStudents();
            } catch (err) {
                showNotification(err.message || 'Error adding student', 'error');
            }
        }

        async function viewStudent(id) {
            try {
                const student = await api.get(`/students/${id}`);
                alert(
                    `Student Profile\n\n` +
                    `Name: ${student.last_name}, ${student.first_name} ${student.middle_name || ''}\n` +
                    `LRN: ${student.lrn}\n` +
                    `Gender: ${student.gender || '-'}\n` +
                    `Birth Date: ${student.birth_date || '-'}\n` +
                    `Contact: ${student.contact_number || '-'}\n` +
                    `Address: ${student.address || '-'}\n` +
                    `Guardian: ${student.guardian_name || '-'}\n` +
                    `Guardian Contact: ${student.guardian_contact || '-'}`
                );
            } catch (err) {
                showNotification('Error loading student details', 'error');
            }
        }

        loadStudents();
    </script>
</body>
</html>
