<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - JNHS Portal</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .announcement-card {
            background: white; border-radius: 10px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 15px;
            border-left: 4px solid #2c5282;
        }
        .announcement-card h3 { color: #1e3a5f; margin-bottom: 8px; }
        .announcement-meta { font-size: 0.85rem; color: #718096; margin-bottom: 10px; }
        .announcement-body { line-height: 1.6; }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Announcements</h1>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div id="announcementsContainer">
                    <p class="text-secondary">Loading announcements...</p>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('announcements');

        async function loadAnnouncements() {
            try {
                const announcements = await api.get('/announcements');
                const container = document.getElementById('announcementsContainer');

                if (!announcements || announcements.length === 0) {
                    container.innerHTML = '<p class="text-secondary">No announcements at this time.</p>';
                    return;
                }

                container.innerHTML = announcements.map(a => `
                    <div class="announcement-card">
                        <h3>${a.title}</h3>
                        <div class="announcement-meta">
                            Posted by ${a.posted_by || 'Administrator'} | ${formatDateTime(a.created_at)}
                        </div>
                        <div class="announcement-body">${a.content}</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        loadAnnouncements();
    </script>
</body>
</html>
