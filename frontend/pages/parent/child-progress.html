<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Progress - JNHS Portal</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .child-selector { margin-bottom: 20px; }
        .child-card {
            background: white; border-radius: 10px; padding: 15px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 10px;
            cursor: pointer; transition: transform 0.2s; border: 2px solid transparent;
        }
        .child-card:hover { transform: translateY(-2px); }
        .child-card.active { border-color: #2c5282; }
        .grade-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-weight: 600; font-size: 0.9rem;
        }
        .grade-pass { background: #c6f6d5; color: #276749; }
        .grade-fail { background: #fed7d7; color: #9b2c2c; }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Child Progress</h1>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="card">
                    <div class="card-header">
                        <h3>Select Child</h3>
                    </div>
                    <div class="card-body child-selector" id="childSelector">
                        <p class="text-secondary">Loading children...</p>
                    </div>
                </div>

                <div id="childProgress" style="display:none;">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon green">&#9632;</div>
                            <div class="stat-info">
                                <h4 id="presentCount">0</h4>
                                <p>Days Present</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon red">&#9632;</div>
                            <div class="stat-info">
                                <h4 id="absentCount">0</h4>
                                <p>Days Absent</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon yellow">&#9632;</div>
                            <div class="stat-info">
                                <h4 id="lateCount">0</h4>
                                <p>Days Tardy</p>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3>Grades by Quarter</h3>
                        </div>
                        <div class="card-body" id="gradesContainer">
                            <p class="text-secondary">Loading grades...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('progress');
        let childrenData = [];

        async function loadChildren() {
            try {
                const children = await api.get('/parent/children');
                childrenData = children;
                const selector = document.getElementById('childSelector');

                if (!children || children.length === 0) {
                    selector.innerHTML = '<p class="text-secondary">No children linked to your account.</p>';
                    return;
                }

                selector.innerHTML = children.map(c => `
                    <div class="child-card" onclick="selectChild(${c.id}, this)">
                        <strong>${c.last_name}, ${c.first_name} ${c.middle_name || ''}</strong>
                        <span style="margin-left:15px;color:#718096;">Grade ${c.grade_level} - ${c.section}</span>
                        <span style="float:right;color:#718096;">${c.relationship}</span>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function selectChild(studentId, el) {
            document.querySelectorAll('.child-card').forEach(c => c.classList.remove('active'));
            if (el) el.classList.add('active');

            try {
                const data = await api.get(`/parent/child/${studentId}/dashboard`);
                document.getElementById('childProgress').style.display = 'block';

                document.getElementById('presentCount').textContent = data.attendance.present;
                document.getElementById('absentCount').textContent = data.attendance.absent;
                document.getElementById('lateCount').textContent = data.attendance.late;

                const gradesContainer = document.getElementById('gradesContainer');
                if (!data.grades || data.grades.length === 0) {
                    gradesContainer.innerHTML = '<p class="text-secondary">No grades recorded yet</p>';
                    return;
                }

                const grouped = {};
                data.grades.forEach(g => {
                    if (!grouped[g.subject]) grouped[g.subject] = {};
                    grouped[g.subject][g.quarter] = g.transmuted_grade;
                });

                let html = '<table style="width:100%;border-collapse:collapse;">';
                html += '<tr style="background:#f7fafc;"><th style="padding:8px;text-align:left;border-bottom:1px solid #e2e8f0;">Subject</th>';
                ['Q1', 'Q2', 'Q3', 'Q4'].forEach(q => {
                    html += `<th style="padding:8px;border-bottom:1px solid #e2e8f0;">${q}</th>`;
                });
                html += '<th style="padding:8px;border-bottom:1px solid #e2e8f0;">Avg</th></tr>';

                Object.keys(grouped).sort().forEach(subject => {
                    const q = grouped[subject];
                    let sum = 0, count = 0;
                    html += `<tr><td style="padding:8px;border-bottom:1px solid #e2e8f0;font-weight:500;">${subject}</td>`;
                    ['Q1', 'Q2', 'Q3', 'Q4'].forEach(qtr => {
                        if (q[qtr]) {
                            const cls = q[qtr] >= 75 ? 'grade-pass' : 'grade-fail';
                            html += `<td style="padding:8px;text-align:center;border-bottom:1px solid #e2e8f0;"><span class="grade-badge ${cls}">${q[qtr]}</span></td>`;
                            sum += q[qtr]; count++;
                        } else {
                            html += '<td style="padding:8px;text-align:center;border-bottom:1px solid #e2e8f0;">-</td>';
                        }
                    });
                    if (count > 0) {
                        const avg = (sum / count).toFixed(1);
                        const cls = avg >= 75 ? 'grade-pass' : 'grade-fail';
                        html += `<td style="padding:8px;text-align:center;border-bottom:1px solid #e2e8f0;"><span class="grade-badge ${cls}" style="font-size:1rem;">${avg}</span></td>`;
                    } else {
                        html += '<td style="padding:8px;text-align:center;border-bottom:1px solid #e2e8f0;">-</td>';
                    }
                    html += '</tr>';
                });
                html += '</table>';
                gradesContainer.innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }

        loadChildren();
    </script>
</body>
</html>
