<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - JNHS Portal</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .profile-header { display: flex; gap: 24px; align-items: center; padding: 30px; }
        .profile-avatar-lg { width: 100px; height: 100px; border-radius: 50%; background: rgba(233,30,99,0.15); color: #e91e63; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 700; flex-shrink: 0; overflow: hidden; position: relative; cursor: pointer; }
        .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
        .profile-avatar-lg:hover .avatar-overlay { opacity: 1; }
        .avatar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; color: #fff; font-size: 0.75rem; }
        .profile-name { font-size: 1.5rem; font-weight: 700; }
        .profile-role { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
        .profile-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .info-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; }
        .info-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-light); }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-muted); font-size: 0.85rem; }
        .info-value { color: var(--text-primary); font-weight: 500; font-size: 0.9rem; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .linked-student { padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 8px; }
        .linked-student .name { font-weight: 600; }
        .linked-student .meta { color: var(--text-muted); font-size: 0.8rem; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title"><h1>My Profile</h1><p>Manage your account information</p></div>
                <div class="topbar-actions"><span class="user-info"></span></div>
            </div>
            <div class="content">
                <div class="card">
                    <div class="profile-header">
                        <div class="profile-avatar-lg" id="profileAvatar" onclick="document.getElementById('photoInput').click()">
                            <span id="avatarText">-</span>
                            <div class="avatar-overlay"><i class="fas fa-camera"></i></div>
                        </div>
                        <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="uploadPhoto(this)">
                        <div><div class="profile-name" id="profileName">-</div><div class="profile-role">Parent / Guardian</div></div>
                    </div>
                </div>
                <div class="profile-info-grid">
                    <div class="info-card">
                        <h3><i class="fas fa-user" style="margin-right:8px;color:#e91e63;"></i>Personal Information</h3>
                        <div class="form-group"><label>First Name *</label><input type="text" class="form-control" id="editFirstName" required></div>
                        <div class="form-group"><label>Last Name *</label><input type="text" class="form-control" id="editLastName" required></div>
                        <div class="form-group"><label>Contact Number</label><input type="text" class="form-control" id="editContact"></div>
                        <div class="form-group"><label>Address</label><input type="text" class="form-control" id="editAddress"></div>
                        <button class="btn btn-primary" onclick="saveProfile()" style="margin-top:10px;">Save Changes</button>
                    </div>
                    <div class="info-card">
                        <h3><i class="fas fa-link" style="margin-right:8px;color:var(--neon-cyan);"></i>Linked Students</h3>
                        <div id="linkedStudents"><p style="color:var(--text-muted);">Loading...</p></div>
                        <h3 style="margin-top:20px;"><i class="fas fa-shield-alt" style="margin-right:8px;color:var(--neon-yellow);"></i>Security</h3>
                        <div class="btn-group"><button class="btn btn-outline" onclick="showModal('passwordModal')"><i class="fas fa-key" style="margin-right:6px;"></i>Change Password</button></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="modal" id="passwordModal">
        <div class="modal-content" style="max-width:420px;">
            <div class="modal-header"><h3>Change Password</h3><button class="modal-close" onclick="hideModal('passwordModal')">&times;</button></div>
            <div class="modal-body">
                <div class="form-group"><label>Current Password</label><input type="password" class="form-control" id="currentPassword" required></div>
                <div class="form-group"><label>New Password</label><input type="password" class="form-control" id="newPassword" required minlength="6"></div>
                <div class="form-group"><label>Confirm New Password</label><input type="password" class="form-control" id="confirmPassword" required minlength="6"></div>
            </div>
            <div class="modal-footer"><button class="btn btn-outline" onclick="hideModal('passwordModal')">Cancel</button><button class="btn btn-primary" onclick="changePassword()">Update Password</button></div>
        </div>
    </div>
    <script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/utils.js"></script>
    <script>
        initDashboard('profile');
        async function loadProfile() {
            try {
                const data = await api.get('/profile/');
                const avatar = document.getElementById('profileAvatar');
                const avatarText = document.getElementById('avatarText');
                if (data.profile_picture) { avatarText.style.display = 'none'; avatar.insertAdjacentHTML('afterbegin', `<img src="/uploads/profiles/${data.profile_picture}" alt="Profile">`); }
                else { avatarText.textContent = (data.username || 'U')[0].toUpperCase(); }
                document.getElementById('profileName').textContent = data.username;
                if (data.academic) {
                    document.getElementById('editFirstName').value = data.academic.first_name || '';
                    document.getElementById('editLastName').value = data.academic.last_name || '';
                    document.getElementById('editContact').value = data.academic.contact_number || '';
                    document.getElementById('editAddress').value = data.academic.address || '';
                    const linked = document.getElementById('linkedStudents');
                    if (data.academic.linked_students && data.academic.linked_students.length > 0) {
                        linked.innerHTML = data.academic.linked_students.map(s => `
                            <div class="linked-student">
                                <div class="name">${s.name}</div>
                                <div class="meta">LRN: ${s.lrn} | ${s.relationship || 'N/A'}</div>
                            </div>
                        `).join('');
                    } else {
                        linked.innerHTML = '<p style="color:var(--text-muted);">No linked students</p>';
                    }
                }
                document.getElementById('editEmail').value = data.email || '';
            } catch (err) { console.error(err); }
        }
        async function saveProfile() {
            try {
                await api.put('/profile/', {
                    first_name: document.getElementById('editFirstName').value,
                    last_name: document.getElementById('editLastName').value,
                    contact_number: document.getElementById('editContact').value,
                    address: document.getElementById('editAddress').value,
                });
                showNotification('Profile updated successfully');
            } catch (err) { showNotification(err.message || 'Error', 'error'); }
        }
        async function uploadPhoto(input) {
            const file = input.files[0]; if (!file) return;
            const formData = new FormData(); formData.append('file', file);
            try {
                const token = localStorage.getItem('jnhs_token');
                const resp = await fetch('/api/profile/picture', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
                if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail); }
                const result = await resp.json();
                const avatar = document.getElementById('profileAvatar');
                const existing = avatar.querySelector('img'); if (existing) existing.remove();
                document.getElementById('avatarText').style.display = 'none';
                avatar.insertAdjacentHTML('afterbegin', `<img src="${result.profile_picture}" alt="Profile">`);
                showNotification('Profile picture updated');
            } catch (err) { showNotification(err.message || 'Error', 'error'); }
        }
        async function changePassword() {
            const c = document.getElementById('currentPassword').value, n = document.getElementById('newPassword').value, cf = document.getElementById('confirmPassword').value;
            if (!c || !n || !cf) { showNotification('Fill all fields', 'error'); return; }
            if (n !== cf) { showNotification('Passwords do not match', 'error'); return; }
            if (n.length < 6) { showNotification('Min 6 characters', 'error'); return; }
            try {
                await api.post(`/auth/change-password?current_password=${encodeURIComponent(c)}&new_password=${encodeURIComponent(n)}`);
                showNotification('Password changed'); hideModal('passwordModal');
                document.getElementById('currentPassword').value = ''; document.getElementById('newPassword').value = ''; document.getElementById('confirmPassword').value = '';
            } catch (err) { showNotification(err.message || 'Error', 'error'); }
        }
        loadProfile();
    </script>
</body>
</html>
