<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - JNHS Portal</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --neon-pink: #e91e63;
            --neon-cyan: #00e5ff;
            --neon-purple: #7c4dff;
            --dark-bg: #0d1117;
            --dark-surface: #161b22;
            --dark-card: #1c2333;
            --dark-border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --neon-pink-glow: rgba(233, 30, 99, 0.3);
            --neon-cyan-glow: rgba(0, 229, 255, 0.3);
            --neon-purple-glow: rgba(124, 77, 255, 0.3);
        }

        body {
            background: var(--dark-bg);
            color: var(--text-primary);
        }

        .child-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .child-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan), var(--neon-purple));
        }

        .child-card:hover {
            transform: translateY(-3px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan-glow);
        }

        .child-card h3 {
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .child-card p {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .stat-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan-glow);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .stat-icon.green {
            background: rgba(0, 229, 255, 0.15);
            color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan-glow);
        }

        .stat-icon.red {
            background: rgba(233, 30, 99, 0.15);
            color: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink-glow);
        }

        .stat-icon.yellow {
            background: rgba(124, 77, 255, 0.15);
            color: var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple-glow);
        }

        .stat-info h4 {
            font-size: 1.8rem;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .stat-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--dark-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-header h3 {
            color: var(--text-primary);
            margin: 0;
        }

        .card-body {
            padding: 20px;
        }

        .grade-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .grade-pass {
            background: rgba(0, 229, 255, 0.15);
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        .grade-fail {
            background: rgba(233, 30, 99, 0.15);
            color: var(--neon-pink);
            border: 1px solid rgba(233, 30, 99, 0.3);
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: var(--dark-surface);
            color: var(--neon-cyan);
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid var(--dark-border);
            font-weight: 600;
        }

        table td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--dark-border);
            color: var(--text-primary);
        }

        table tr:hover {
            background: rgba(0, 229, 255, 0.05);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 15px var(--neon-cyan-glow);
        }

        .text-secondary {
            color: var(--text-secondary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Parent Dashboard</h1>
                    <p>Welcome, <span id="parentName">Parent</span></p>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div id="childrenContainer">
                    <p class="text-secondary">Loading children...</p>
                </div>

                <div id="childDetail" style="display:none;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                        <h2 id="childName">Child Name</h2>
                        <button class="btn btn-outline" onclick="showChildList()">Back to Children</button>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon green">&#9632;</div>
                            <div class="stat-info">
                                <h4 id="childPresent">0</h4>
                                <p>Days Present</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon red">&#9632;</div>
                            <div class="stat-info">
                                <h4 id="childAbsent">0</h4>
                                <p>Days Absent</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon yellow">&#9632;</div>
                            <div class="stat-info">
                                <h4 id="childLate">0</h4>
                                <p>Days Tardy</p>
                            </div>
                        </div>
                    </div>

                    <div class="charts-grid">
                        <div class="card">
                            <div class="card-header">
                                <h3>Grades by Subject</h3>
                            </div>
                            <div class="card-body">
                                <div class="chart-container">
                                    <canvas id="gradesChart"></canvas>
                                </div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header">
                                <h3>Attendance Distribution</h3>
                            </div>
                            <div class="card-body">
                                <div class="chart-container">
                                    <canvas id="attendanceChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h3>Grades</h3>
                        </div>
                        <div class="card-body" id="childGrades">
                            <p class="text-secondary">Loading grades...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('dashboard');
        const user = Auth.getUser();
        if (user) {
            document.getElementById('parentName').textContent = user.username;
        }

        let gradesChartInstance = null;
        let attendanceChartInstance = null;

        function destroyCharts() {
            if (gradesChartInstance) {
                gradesChartInstance.destroy();
                gradesChartInstance = null;
            }
            if (attendanceChartInstance) {
                attendanceChartInstance.destroy();
                attendanceChartInstance = null;
            }
        }

        function createGradesRadarChart(grades) {
            const ctx = document.getElementById('gradesChart').getContext('2d');
            const grouped = {};
            grades.forEach(g => {
                if (!grouped[g.subject]) grouped[g.subject] = [];
                grouped[g.subject].push(g.transmuted_grade);
            });

            const labels = Object.keys(grouped).sort();
            const avgGrades = labels.map(subject => {
                const vals = grouped[subject];
                return vals.reduce((a, b) => a + b, 0) / vals.length;
            });

            if (gradesChartInstance) gradesChartInstance.destroy();

            gradesChartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Average Grade',
                        data: avgGrades,
                        backgroundColor: 'rgba(0, 229, 255, 0.2)',
                        borderColor: '#00e5ff',
                        borderWidth: 2,
                        pointBackgroundColor: '#00e5ff',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#e91e63',
                        pointHoverBorderColor: '#fff',
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e6edf3',
                                font: { size: 13 }
                            }
                        }
                    },
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                color: '#8b949e',
                                backdropColor: 'transparent',
                                stepSize: 20
                            },
                            grid: {
                                color: 'rgba(48, 54, 61, 0.8)'
                            },
                            angleLines: {
                                color: 'rgba(48, 54, 61, 0.8)'
                            },
                            pointLabels: {
                                color: '#e6edf3',
                                font: { size: 11 }
                            }
                        }
                    }
                }
            });
        }

        function createAttendanceBarChart(attendance) {
            const ctx = document.getElementById('attendanceChart').getContext('2d');

            if (attendanceChartInstance) attendanceChartInstance.destroy();

            attendanceChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Present', 'Absent', 'Late'],
                    datasets: [{
                        label: 'Days',
                        data: [attendance.present, attendance.absent, attendance.late],
                        backgroundColor: [
                            'rgba(0, 229, 255, 0.7)',
                            'rgba(233, 30, 99, 0.7)',
                            'rgba(124, 77, 255, 0.7)'
                        ],
                        borderColor: [
                            '#00e5ff',
                            '#e91e63',
                            '#7c4dff'
                        ],
                        borderWidth: 2,
                        borderRadius: 6,
                        hoverBackgroundColor: [
                            '#00e5ff',
                            '#e91e63',
                            '#7c4dff'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e6edf3',
                                font: { size: 13 }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#e6edf3' },
                            grid: { color: 'rgba(48, 54, 61, 0.5)' }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: '#8b949e',
                                stepSize: 1
                            },
                            grid: { color: 'rgba(48, 54, 61, 0.5)' }
                        }
                    }
                }
            });
        }

        async function loadChildren() {
            try {
                const children = await api.get('/parent/children');
                const container = document.getElementById('childrenContainer');

                if (!children || children.length === 0) {
                    container.innerHTML = '<p class="text-secondary">No children linked to your account. Please contact the registrar.</p>';
                    return;
                }

                container.innerHTML = '<h2 style="margin-bottom:15px;">My Children</h2>' +
                    children.map(c => `
                        <div class="child-card" onclick="viewChild(${c.id})">
                            <h3>${c.last_name}, ${c.first_name} ${c.middle_name || ''}</h3>
                            <p>LRN: ${c.lrn} | Grade ${c.grade_level} - ${c.section} ${c.track ? '(' + c.track + ')' : ''}</p>
                            <p>Relationship: ${c.relationship}</p>
                        </div>
                    `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function viewChild(studentId) {
            try {
                destroyCharts();
                const data = await api.get(`/parent/child/${studentId}/dashboard`);

                document.getElementById('childrenContainer').style.display = 'none';
                document.getElementById('childDetail').style.display = 'block';

                document.getElementById('childName').textContent = `${data.student.last_name}, ${data.student.first_name}`;
                document.getElementById('childPresent').textContent = data.attendance.present;
                document.getElementById('childAbsent').textContent = data.attendance.absent;
                document.getElementById('childLate').textContent = data.attendance.late;

                if (data.grades && data.grades.length > 0) {
                    createGradesRadarChart(data.grades);
                }

                createAttendanceBarChart(data.attendance);

                const gradesContainer = document.getElementById('childGrades');
                if (!data.grades || data.grades.length === 0) {
                    gradesContainer.innerHTML = '<p class="text-secondary">No grades recorded yet</p>';
                    return;
                }

                const grouped = {};
                data.grades.forEach(g => {
                    if (!grouped[g.subject]) grouped[g.subject] = {};
                    grouped[g.subject][g.quarter] = g.transmuted_grade;
                });

                let html = '<table>';
                html += '<tr><th>Subject</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th></tr>';

                Object.keys(grouped).sort().forEach(subject => {
                    const q = grouped[subject];
                    html += `<tr><td>${subject}</td>`;
                    ['Q1', 'Q2', 'Q3', 'Q4'].forEach(qtr => {
                        const grade = q[qtr];
                        if (grade !== undefined && grade !== null) {
                            const cls = grade >= 75 ? 'grade-pass' : 'grade-fail';
                            html += `<td style="text-align:center;"><span class="grade-badge ${cls}">${grade}</span></td>`;
                        } else {
                            html += '<td style="text-align:center;">-</td>';
                        }
                    });
                    html += '</tr>';
                });
                html += '</table>';
                gradesContainer.innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }

        function showChildList() {
            destroyCharts();
            document.getElementById('childrenContainer').style.display = 'block';
            document.getElementById('childDetail').style.display = 'none';
        }

        loadChildren();
    </script>
</body>
</html>
