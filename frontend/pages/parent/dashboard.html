<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - JNHS Portal</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>Parent Dashboard</h1>
                    <p>Welcome, <span id="parentName">Parent</span></p>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="grid-2">
                    <div class="card">
                        <div class="card-header">
                            <h3>Child's Progress</h3>
                        </div>
                        <div class="card-body" id="childProgress">
                            <p class="text-secondary">Loading...</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>Announcements</h3>
                        </div>
                        <div class="card-body" id="parentAnnouncements">
                            <p class="text-secondary">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('dashboard');
        const user = Auth.getUser();
        if (user) {
            document.getElementById('parentName').textContent = user.username;
        }
    </script>
</body>
</html>
