<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - JNHS Portal</title>
    <link rel="icon" type="image/png" href="/assets/images/logo.png">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .role-badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 0.8rem; font-weight: 500;
        }
        .role-super_admin { background: rgba(233,30,99,0.2); color: #e91e63; border: 1px solid rgba(233,30,99,0.3); }
        .role-admin { background: rgba(0,229,255,0.2); color: #00e5ff; border: 1px solid rgba(0,229,255,0.3); }
        .role-principal { background: rgba(124,77,255,0.2); color: #7c4dff; border: 1px solid rgba(124,77,255,0.3); }
        .role-registrar { background: rgba(0,230,118,0.2); color: #00e676; border: 1px solid rgba(0,230,118,0.3); }
        .role-teacher { background: rgba(41,121,255,0.2); color: #2979ff; border: 1px solid rgba(41,121,255,0.3); }
        .role-student { background: rgba(255,193,7,0.2); color: #ffc107; border: 1px solid rgba(255,193,7,0.3); }
        .role-parent { background: rgba(255,82,82,0.2); color: #ff5252; border: 1px solid rgba(255,82,82,0.3); }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>User Management</h1>
                </div>
                <div class="topbar-actions">
                    <button class="btn btn-primary" onclick="showModal('createUserModal')">Create Account</button>
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="fas fa-users"></i></div>
                        <div class="stat-info">
                            <h4 id="totalUsers">0</h4>
                            <p>Total Users</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-user-check"></i></div>
                        <div class="stat-info">
                            <h4 id="activeUsers">0</h4>
                            <p>Active Users</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>All Users</h3>
                        <select class="form-control" id="filterRole" onchange="filterUsers()" style="width:180px;">
                            <option value="">All Roles</option>
                            <option value="super_admin">Super Admin</option>
                            <option value="admin">Admin</option>
                            <option value="principal">Principal</option>
                            <option value="registrar">Registrar</option>
                            <option value="teacher">Teacher</option>
                            <option value="student">Student</option>
                            <option value="parent">Parent</option>
                        </select>
                    </div>
                    <div class="card-body">
                        <table style="width:100%;border-collapse:collapse;">
                            <thead>
                                <tr style="background:rgba(30,42,74,0.5);">
                                    <th style="padding:10px;text-align:left;border-bottom:2px solid #1e2a4a;color:#00e5ff;">Username</th>
                                    <th style="padding:10px;text-align:left;border-bottom:2px solid #1e2a4a;color:#00e5ff;">Email</th>
                                    <th style="padding:10px;text-align:left;border-bottom:2px solid #1e2a4a;color:#00e5ff;">Role</th>
                                    <th style="padding:10px;text-align:left;border-bottom:2px solid #1e2a4a;color:#00e5ff;">Status</th>
                                    <th style="padding:10px;text-align:center;border-bottom:2px solid #1e2a4a;color:#00e5ff;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersBody">
                                <tr><td colspan="5" style="padding:20px;text-align:center;color:#718096;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="createUserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Account</h3>
                <button class="modal-close" onclick="hideModal('createUserModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="createUserForm" onsubmit="createUser(event)">
                    <div class="form-group">
                        <label>Account Type *</label>
                        <select class="form-control" id="newRole" required onchange="toggleFields()">
                            <option value="">Select Role</option>
                            <option value="admin">Admin</option>
                            <option value="principal">Principal</option>
                            <option value="registrar">Registrar</option>
                        </select>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Username *</label>
                            <input type="text" class="form-control" id="newUsername" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" class="form-control" id="newEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Password *</label>
                            <input type="password" class="form-control" id="newPassword" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label>Confirm Password *</label>
                            <input type="password" class="form-control" id="confirmPassword" required minlength="6">
                        </div>
                    </div>
                    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:15px;">
                        <button type="button" class="btn btn-outline" onclick="hideModal('createUserModal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('system-users');
        let allUsers = [];

        async function loadUsers() {
            try {
                const stats = await api.get('/system/stats/overview');
                document.getElementById('totalUsers').textContent = stats.total_users || 0;
                document.getElementById('activeUsers').textContent = stats.active_users || 0;

                const users = await api.get('/system/logs?limit=100').catch(() => []);
                allUsers = stats.users || [];
                renderUsers(allUsers);
            } catch (err) {
                console.error(err);
            }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersBody');
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="padding:20px;text-align:center;color:#5a6a8a;">No users found</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td style="padding:10px;border-bottom:1px solid #1e2a4a;font-weight:500;color:#e0e0e0;">${u.username}</td>
                    <td style="padding:10px;border-bottom:1px solid #1e2a4a;color:#8892b0;">${u.email || '-'}</td>
                    <td style="padding:10px;border-bottom:1px solid #1e2a4a;"><span class="role-badge role-${u.role}">${u.role.replace('_', ' ').toUpperCase()}</span></td>
                    <td style="padding:10px;border-bottom:1px solid #1e2a4a;"><span style="color:${u.is_active ? '#00e5ff' : '#e91e63'};">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                    <td style="padding:10px;border-bottom:1px solid #1e2a4a;text-align:center;">
                        <button class="btn btn-sm btn-outline" onclick="resetPassword(${u.id}, '${u.username}')">Reset Password</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterUsers() {
            const role = document.getElementById('filterRole').value;
            const filtered = role ? allUsers.filter(u => u.role === role) : allUsers;
            renderUsers(filtered);
        }

        function toggleFields() {
            // No extra fields needed for admin/principal/registrar
        }

        async function createUser(e) {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (password !== confirm) {
                showNotification('Passwords do not match', 'error');
                return;
            }

            try {
                await api.post('/auth/register', {
                    username: document.getElementById('newUsername').value,
                    email: document.getElementById('newEmail').value,
                    password: password,
                    role: document.getElementById('newRole').value,
                });
                showNotification('Account created successfully');
                hideModal('createUserModal');
                document.getElementById('createUserForm').reset();
                loadUsers();
            } catch (err) {
                showNotification(err.message || 'Error creating account', 'error');
            }
        }

        async function resetPassword(userId, username) {
            const newPass = prompt(`Enter new password for ${username}:`);
            if (!newPass || newPass.length < 6) {
                showNotification('Password must be at least 6 characters', 'error');
                return;
            }
            try {
                await api.post(`/system/users/${userId}/reset-password`, {
                    password: newPass,
                });
                showNotification('Password reset successfully');
                loadUsers();
            } catch (err) {
                showNotification(err.message || 'Error resetting password', 'error');
            }
        }

        loadUsers();
    </script>
</body>
</html>
