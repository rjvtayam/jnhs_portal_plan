<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - JNHS Portal</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon_io/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon_io/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon_io/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .profile-header { display: flex; gap: 24px; align-items: center; padding: 30px; }
        .profile-avatar-lg { width: 100px; height: 100px; border-radius: 50%; background: rgba(0,229,255,0.15); color: var(--neon-cyan); display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: 700; flex-shrink: 0; overflow: hidden; }
        .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 1.5rem; font-weight: 700; }
        .profile-role { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }
        .profile-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .info-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; }
        .info-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-light); }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-muted); font-size: 0.85rem; }
        .info-value { color: var(--text-primary); font-weight: 500; font-size: 0.9rem; }
        .status-active { background: rgba(0,230,118,0.15); color: #00e676; padding: 3px 12px; border-radius: 12px; font-size: 0.8rem; }
        .btn-change-password { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar"></aside>
        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">
                    <h1>My Profile</h1>
                    <p>View your account information</p>
                </div>
                <div class="topbar-actions">
                    <span class="user-info"></span>
                </div>
            </div>
            <div class="content">
                <div class="card">
                    <div class="profile-header">
                        <div class="profile-avatar-lg" id="profileAvatar">-</div>
                        <div>
                            <div class="profile-name" id="profileName">-</div>
                            <div class="profile-role" id="profileRole">-</div>
                            <div style="margin-top:8px;"><span class="status-active" id="profileStatus">Active</span></div>
                        </div>
                    </div>
                </div>

                <div class="profile-info-grid">
                    <div class="info-card">
                        <h3><i class="fas fa-user" style="margin-right:8px;color:var(--neon-cyan);"></i>Account Information</h3>
                        <div class="info-row"><span class="info-label">Username</span><span class="info-value" id="infoUsername">-</span></div>
                        <div class="info-row"><span class="info-label">Email</span><span class="info-value" id="infoEmail">-</span></div>
                        <div class="info-row"><span class="info-label">Role</span><span class="info-value" id="infoRole">-</span></div>
                        <div class="info-row"><span class="info-label">Member Since</span><span class="info-value" id="infoCreated">-</span></div>
                        <div class="info-row"><span class="info-label">Last Login</span><span class="info-value" id="infoLastLogin">-</span></div>
                    </div>
                    <div class="info-card">
                        <h3><i class="fas fa-shield-alt" style="margin-right:8px;color:var(--neon-yellow);"></i>Security</h3>
                        <div class="info-row"><span class="info-label">Password</span><span class="info-value">••••••••</span></div>
                        <button class="btn btn-outline btn-change-password" onclick="showModal('passwordModal')">
                            <i class="fas fa-key" style="margin-right:6px;"></i>Change Password
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="passwordModal">
        <div class="modal-content" style="max-width:420px;">
            <div class="modal-header">
                <h3>Change Password</h3>
                <button class="modal-close" onclick="hideModal('passwordModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" class="form-control" id="currentPassword" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" class="form-control" id="newPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" class="form-control" id="confirmPassword" required minlength="6">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="hideModal('passwordModal')">Cancel</button>
                <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        initDashboard('profile');

        async function loadProfile() {
            try {
                const data = await api.get('/profile/');
                const user = Auth.getUser();

                const initials = ((data.username || 'U')[0] || 'U').toUpperCase();
                const avatar = document.getElementById('profileAvatar');
                if (data.profile_picture) {
                    avatar.innerHTML = `<img src="/uploads/profiles/${data.profile_picture}" alt="Profile">`;
                } else {
                    avatar.textContent = initials;
                }

                document.getElementById('profileName').textContent = data.username;
                document.getElementById('profileRole').textContent = capitalize(data.role).replace('_', ' ');
                document.getElementById('profileStatus').textContent = data.is_active ? 'Active' : 'Inactive';
                document.getElementById('profileStatus').className = data.is_active ? 'status-active' : 'status-inactive';

                document.getElementById('infoUsername').textContent = data.username;
                document.getElementById('infoEmail').textContent = data.email || '-';
                document.getElementById('infoRole').textContent = capitalize(data.role).replace('_', ' ');
                document.getElementById('infoCreated').textContent = data.created_at ? formatDate(data.created_at) : '-';
                document.getElementById('infoLastLogin').textContent = data.last_login ? formatDateTime(data.last_login) : '-';
            } catch (err) {
                console.error(err);
            }
        }

        async function changePassword() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!current || !newPass || !confirm) {
                showNotification('Please fill in all fields', 'error');
                return;
            }
            if (newPass !== confirm) {
                showNotification('New passwords do not match', 'error');
                return;
            }
            if (newPass.length < 6) {
                showNotification('Password must be at least 6 characters', 'error');
                return;
            }

            try {
                await api.post(`/auth/change-password?current_password=${encodeURIComponent(current)}&new_password=${encodeURIComponent(newPass)}`);
                showNotification('Password changed successfully');
                hideModal('passwordModal');
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            } catch (err) {
                showNotification(err.message || 'Error changing password', 'error');
            }
        }

        loadProfile();
    </script>
</body>
</html>
